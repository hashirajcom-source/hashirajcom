<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoba Quiz</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/wTVy85Yj/Desain-tanpa-judul-20260307-090651-0000.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .hero-bg { background: radial-gradient(circle at bottom left, #eef2ff, #ffffff, #fdf4ff); min-height: 100vh; }
        .ans-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .ans-btn:active { transform: scale(0.95); }
        .hidden { display: none; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s ease-out forwards; }
    </style>
</head>
<body class="hero-bg text-slate-900 p-4 md:p-8 flex items-center justify-center">

    <div id="setup-menu" class="max-w-xl w-full glass-card p-8 rounded-[2.5rem] shadow-2xl animate-pop">
        <div class="text-center mb-10">
            <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Mastery Series</span>
            <h1 class="text-4xl font-extrabold text-indigo-600 mt-2">Kotoba <span class="text-slate-800">Quiz</span></h1>
            <p class="text-slate-500 mt-2">Perdalam hafalan kosakata JLPT kamu</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Pilih Level</label>
                <div class="flex gap-2">
                    <button onclick="setCfg('lvl', 'n5')" id="lvl-n5" class="cfg-btn flex-1 py-3 rounded-2xl border-2 border-indigo-600 bg-indigo-50 text-indigo-600 font-bold">N5</button>
                    <button onclick="setCfg('lvl', 'n4')" id="lvl-n4" class="cfg-btn flex-1 py-3 rounded-2xl border-2 border-slate-100 font-bold hover:border-indigo-200">N4</button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Kategori</label>
                <select id="kat-select" class="w-full p-3 rounded-2xl border-2 border-slate-100 font-bold focus:border-indigo-500 outline-none">
                    <option value="benda">Meishi (Benda)</option>
                    <option value="sifat">Keiyoushi (Sifat)</option>
                    <option value="kerja">Doushi (Kerja)</option>
                </select>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <span class="font-bold text-slate-700">Jumlah Pertanyaan</span>
                <div class="flex items-center gap-4">
                    <input type="range" id="q-range" min="5" max="30" value="10" class="accent-indigo-600" oninput="document.getElementById('q-val').innerText = this.value">
                    <span id="q-val" class="font-black text-indigo-600 w-6">10</span>
                </div>
            </div>
        </div>

        <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-bold text-xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all hover:-translate-y-1">Mulai Misi Kotoba</button>
        <a href="menu-quiz.html" class="block text-center mt-6 text-slate-400 font-bold hover:text-indigo-600 transition">Batal</a>
    </div>

    <div id="quiz-area" class="max-w-xl w-full glass-card p-8 rounded-[2.5rem] shadow-2xl hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="q-counter" class="bg-slate-100 px-4 py-1 rounded-full text-xs font-bold text-slate-500 underline decoration-indigo-500">Q: 1/10</span>
            <div class="text-right">
                <p id="current-score" class="text-2xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <div class="text-center mb-10">
            <span id="type-tag" class="text-[10px] font-bold bg-indigo-50 text-indigo-500 px-3 py-1 rounded-lg uppercase tracking-widest">Kategori</span>
            <h2 id="word-display" class="text-5xl md:text-6xl font-black text-slate-800 mt-4 mb-2 tracking-tight">Loading...</h2>
            <p id="reading-display" class="text-slate-400 font-medium italic">...</p>
        </div>

        <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <div id="result-screen" class="max-w-md w-full glass-card p-10 rounded-[2.5rem] shadow-2xl text-center hidden animate-pop">
        <div class="text-6xl mb-6">🎓</div>
        <h2 class="text-3xl font-black mb-2 text-slate-800">Misi Selesai!</h2>
        <p class="text-slate-500 mb-8 font-medium">Kotoba kamu makin tajam, Shall!</p>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-indigo-50 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-indigo-400 uppercase">Skor</p>
                <p id="final-score" class="text-3xl font-black text-indigo-600">0</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Akurasi</p>
                <p id="accuracy" class="text-3xl font-black text-slate-800">0%</p>
            </div>
        </div>

        <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-indigo-600 transition shadow-lg">Main Lagi</button>
    </div>

)':'Berangkat', '到着する(とうちゃくする)':'Tiba', '進学する(しんがくする)':'Melanjutkan Sekolah', '留学する(りゅうがくする)':'Sekolah di Luar Negeri', '復習する(ふくしゅうする)':'Mengulang Pelajaran', '予習する(よしゅうする)':'Belajar Persiapan', '練習する(れんしゅうする)':'Latihan', '研究する(けんきゅうする)':'Meneliti', '生活する(せいかつする)':'Menjalani Hidup', '生産する(せいさんする)':'Memproduksi', '製造する(せいぞうする)':'Manufaktur', '経営する(けいえいする)':'Mengelola Bisnis', '販売する(はんばいする)':'Menjual', '消費する(しょうひする)':'Mengonsumsi', '解決する(かいけつする)':'Menyelesaikan Masalah', '整理する(せいりする)':'Merapikan', '記憶する(きおくする)':'Mengingat' }
            }
        };

        let cfg = { lvl: 'n5', kat: 'benda', total: 10 };
        let score = 0;
        let currentIdx = 0;
        let questions = [];
        let pool = {};

        function setCfg(type, val) {
            cfg[type] = val;
            document.querySelectorAll('.cfg-btn').forEach(b => b.className = 'cfg-btn flex-1 py-3 rounded-2xl border-2 border-slate-100 font-bold hover:border-indigo-200');
            document.getElementById(`lvl-${val}`).className = 'cfg-btn flex-1 py-3 rounded-2xl border-2 border-indigo-600 bg-indigo-50 text-indigo-600 font-bold';
        }

        function startQuiz() {
            cfg.kat = document.getElementById('kat-select').value;
            cfg.total = parseInt(document.getElementById('q-range').value);
            pool = database[cfg.lvl][cfg.kat];
            
            const keys = Object.keys(pool).sort(() => Math.random() - 0.5);
            questions = keys.slice(0, cfg.total);

            document.getElementById('setup-menu').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('type-tag').innerText = cfg.kat;
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIdx >= questions.length) return finish();
            
            document.getElementById('q-counter').innerText = `Q: ${currentIdx + 1}/${questions.length}`;
            const q = questions[currentIdx];
            const answerFull = pool[q];
            const correct = answerFull.split(' (')[0];
            const reading = answerFull.split(' (')[1].replace(')', '');

            document.getElementById('word-display').innerText = q;
            document.getElementById('reading-display').innerText = reading;

            let options = [correct];
            const allPossible = Object.values(pool).map(v => v.split(' (')[0]);
            while(options.length < 4) {
                let rand = allPossible[Math.floor(Math.random() * allPossible.length)];
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold text-lg hover:border-indigo-400 hover:bg-indigo-50 transition-all shadow-sm';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === correct) {
                        score += 10;
                        btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                    } else {
                        btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
                    }
                    document.getElementById('current-score').innerText = score;
                    setTimeout(() => { currentIdx++; nextQuestion(); }, 500);
                };
                grid.appendChild(btn);
            });
        }

        function finish() {
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('accuracy').innerText = Math.round((score / (questions.length * 10)) * 100) + '%';
        }
    </script>
