<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashira Flashcards - Kanji N5</title>
    <style>
        :root {
            --primary: #00a8ff;
            --secondary: #0097e6;
            --bg-light: #f5faff;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --text-main: #2d3436;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary);
            text-transform: uppercase;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }

        .btn-main {
            padding: 18px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 168, 255, 0.25);
            transition: all 0.3s ease;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 168, 255, 0.35);
        }

        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .counter {
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: 700;
            color: var(--primary);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .flashcard-wrapper {
            width: 100%;
            max-width: 400px;
            height: 500px;
            perspective: 1200px;
            margin-bottom: 40px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 30px;
            background: var(--white);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 168, 255, 0.1);
        }

        /* Sisi Depan */
        .front {
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Sisi Belakang */
        .back {
            transform: rotateY(180deg);
            padding: 40px 25px;
            text-align: center;
            justify-content: space-between;
        }

        .meaning-section {
            margin-top: 40px;
        }

        .meaning-title {
            font-size: 2rem;
            font-weight: 800;
            display: block;
            margin-bottom: 10px;
        }

        .reading-text {
            font-size: 1.2rem;
            color: #636e72;
            background: #f1f2f6;
            padding: 5px 15px;
            border-radius: 10px;
        }

        .examples-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            border-top: 2px dashed #e1f5fe;
            padding-top: 20px;
        }

        .example-item {
            flex: 1;
            padding: 10px;
        }

        .ex-word {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .ex-meaning {
            font-size: 0.9rem;
            color: #b2bec3;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .nav-btn {
            padding: 12px 30px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }

        .nav-btn:disabled {
            border-color: #dfe6e9;
            color: #b2bec3;
            cursor: not-allowed;
        }
    </style>
</head>

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            const card = document.getElementById('main-card');
            card.classList.remove('flipped');
            
            // Animasi transisi konten
            setTimeout(() => {
                const data = flashcardData[currentIdx];
                document.getElementById('card-kanji').innerText = data.q;
                document.getElementById('card-meaning').innerText = data.m;
                document.getElementById('card-reading').innerText = data.r;
                document.getElementById('ex-1-word').innerText = data.e1w;
                document.getElementById('ex-1-mean').innerText = data.e1m;
                document.getElementById('ex-2-word').innerText = data.e2w;
                document.getElementById('ex-2-mean').innerText = data.e2m;
                
                document.getElementById('current-idx').innerText = currentIdx + 1;
                document.getElementById('prev-btn').disabled = (currentIdx === 0);
                document.getElementById('next-btn').disabled = (currentIdx === flashcardData.length - 1);
            }, 150);
        }

        function nextCard() {
            if (currentIdx < flashcardData.length - 1) {
                currentIdx++;
                updateUI();
            }
        }

        function prevCard() {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        }
    </script>
</body>
</html>
