<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Kanji N5</title>
    <style>
        :root {
            --primary-blue: #00a8ff;
            --light-blue: #e1f5fe;
            --white: #ffffff;
            --text-dark: #2f3640;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        h1 { margin-top: 20px; color: var(--primary-blue); }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,168,255,0.3);
            transition: 0.3s;
        }

        #start-btn:hover { transform: scale(1.05); background-color: #0097e6; }

        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        .flashcard-wrapper {
            width: 300px;
            height: 400px;
            perspective: 1000px;
            margin: 30px 0;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: var(--white);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--primary-blue);
        }

        .front { font-size: 5rem; font-weight: bold; }
        .back { 
            transform: rotateY(180deg); 
            font-size: 1.8rem; 
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .controls { display: flex; gap: 20px; }

        button.nav-btn {
            padding: 10px 25px;
            border-radius: 10px;
            border: 1px solid var(--primary-blue);
            background: white;
            color: var(--primary-blue);
            cursor: pointer;
            font-weight: bold;
        }

        button.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .counter { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>N5 Kanji Flashcard</h1>

    <div id="intro">
        <button id="start-btn" onclick="startGame()">Mulai Belajar</button>
    </div>

    <div class="game-container" id="game">
        <div class="counter"><span id="current-idx">1</span> / 110</div>
        
        <div class="flashcard-wrapper">
            <div class="card" id="main-card" onclick="this.classList.toggle('flipped')">
                <div class="front" id="card-front">一</div>
                <div class="back" id="card-back">Satu<br>(ichi)</div>
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevCard()" id="prev-btn" disabled>Kembali</button>
            <button class="nav-btn" onclick="nextCard()" id="next-btn">Lanjut</button>
        </div>
    </div>

    <script>
        // DATA 110 KARTU (Lu tinggal ubah isi teks di sini)
        const kanjiData = [
            {q: "一", a: "Satu (ichi)"}, {q: "二", a: "Dua (ni)"}, {q: "三", a: "Tiga (san)"}, {q: "四", a: "Empat (yon)"}, {q: "五", a: "Lima (go)"},
            {q: "六", a: "Enam (roku)"}, {q: "七", a: "Tujuh (nana)"}, {q: "八", a: "Delapan (hachi)"}, {q: "九", a: "Sembilan (kyuu)"}, {q: "十", a: "Sepuluh (juu)"},
            {q: "百", a: "Ratus (hyaku)"}, {q: "千", a: "Ribu (sen)"}, {q: "万", a: "Puluh Ribu (man)"}, {q: "円", a: "Yen / Lingkaran"}, {q: "日", a: "Hari / Matahari"},
            {q: "月", a: "Bulan"}, {q: "火", a: "Api"}, {q: "水", a: "Air"}, {q: "木", a: "Pohon"}, {q: "金", a: "Emas / Uang"},
            {q: "土", a: "Tanah"}, {q: "山", a: "Gunung"}, {q: "川", a: "Sungai"}, {q: "田", a: "Sawah"}, {q: "人", a: "Orang"},
            {q: "子", a: "Anak"}, {q: "女", a: "Wanita"}, {q: "男", a: "Pria"}, {q: "目", a: "Mata"}, {q: "口", a: "Mulut"},
            {q: "耳", a: "Telinga"}, {q: "手", a: "Tangan"}, {q: "足", a: "Kaki"}, {q: "力", a: "Tenaga"}, {q: "父", a: "Ayah"},
            {q: "母", a: "Ibu"}, {q: "先", a: "Sebelumnya"}, {q: "生", a: "Lahir / Hidup"}, {q: "学", a: "Belajar"}, {q: "校", a: "Sekolah"},
            {q: "友", a: "Teman"}, {q: "本", a: "Buku / Asal"}, {q: "何", a: "Apa"}, {q: "前", a: "Depan / Sebelum"}, {q: "後", a: "Belakang / Sesudah"},
            {q: "外", a: "Luar"}, {q: "左", a: "Kiri"}, {q: "右", a: "Kanan"}, {q: "中", a: "Tengah / Dalam"}, {q: "大", a: "Besar"},
            {q: "小", a: "Kecil"}, {q: "上", a: "Atas"}, {q: "下", a: "Bawah"}, {q: "工", a: "Konstruksi"}, {q: "名", a: "Nama"},
            {q: "年", a: "Tahun"}, {q: "出", a: "Keluar"}, {q: "入", a: "Masuk"}, {q: "立", a: "Berdiri"}, {q: "休", a: "Istirahat"},
            {q: "見", a: "Melihat"}, {q: "言", a: "Berkata"}, {q: "貝", a: "Kerang"}, {q: "車", a: "Mobil"}, {q: "白", a: "Putih"},
            {q: "赤", a: "Merah"}, {q: "青", a: "Biru"}, {q: "安", a: "Murah / Tenang"}, {q: "新", a: "Baru"}, {q: "古", a: "Lama / Tua"},
            {q: "多", a: "Banyak"}, {q: "少", a: "Sedikit"}, {q: "長", a: "Panjang / Ketua"}, {q: "早", a: "Cepat (Waktu)"}, {q: "行", a: "Pergi"},
            {q: "来", a: "Datang"}, {q: "食", a: "Makan"}, {q: "飲", a: "Minum"}, {q: "買", a: "Membeli"}, {q: "見", a: "Melihat"},
            {q: "聞", a: "Mendengar"}, {q: "読", a: "Membaca"}, {q: "書", a: "Menulis"}, {q: "話", a: "Berbicara"}, {q: "北", a: "Utara"},
            {q: "南", a: "Selatan"}, {q: "東", a: "Timur"}, {q: "西", a: "Barat"}, {q: "間", a: "Antara"}, {q: "方", a: "Arah / Orang"},
            {q: "今", a: "Sekarang"}, {q: "分", a: "Menit / Bagian"}, {q: "半", a: "Setengah"}, {q: "時", a: "Waktu / Jam"}, {q: "毎", a: "Setiap"},
            {q: "語", a: "Bahasa"}, {q: "国", a: "Negara"}, {q: "天", a: "Surga / Langit"}, {q: "気", a: "Energi / Perasaan"}, {q: "雨", a: "Hujan"},
            {q: "電", a: "Listrik"}, {q: "高", a: "Tinggi / Mahal"}, {q: "長", a: "Panjang"}, {q: "校", a: "Sekolah"}, {q: "社", a: "Perusahaan"},
            {q: "会", a: "Bertemu"}, {q: "店", a: "Toko"}, {q: "駅", a: "Stasiun"}, {q: "花", a: "Bunga"}, {q: "道", a: "Jalan"}
        ];

        let currentIdx = 0;

        function startGame() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            updateCard();
        }

        function updateCard() {
            const card = document.getElementById('main-card');
            card.classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('card-front').innerText = kanjiData[currentIdx].q;
                document.getElementById('card-back').innerHTML = kanjiData[currentIdx].a;
                document.getElementById('current-idx').innerText = currentIdx + 1;
                
                document.getElementById('prev-btn').disabled = (currentIdx === 0);
                document.getElementById('next-btn').disabled = (currentIdx === kanjiData.length - 1);
            }, 150);
        }

        function nextCard() {
            if (currentIdx < kanjiData.length - 1) {
                currentIdx++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIdx > 0) {
                currentIdx--;
                updateCard();
            }
        }
    </script>
</body>
</html>
